<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maritime Mastery Terminal</title>
    <style>
        :root { --cyan: #00e5ff; --red: #e94560; --bg: #0b1220; --panel: #111827; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; text-align: center; }
        header { background: #0d1425; padding: 15px; border-bottom: 2px solid var(--cyan); display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--cyan); color: var(--bg); }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        
        .stats-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--panel); padding: 15px; border-radius: 10px; border-bottom: 3px solid var(--cyan); }
        .stat-box span { display: block; font-weight: bold; font-size: 1.2rem; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .timer-container { width: 100%; background: #070b14; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; border: 1px solid #1f2937; }
        #timer-bar { height: 100%; width: 100%; background: var(--cyan); transition: width 0.1s linear; }

        .card { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: left; }
        .difficulty-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .diff-btn, .study-btn { padding: 8px 15px; border-radius: 5px; border: 1px solid var(--cyan); background: transparent; color: var(--cyan); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .diff-btn.active { background: var(--cyan); color: var(--bg); }
        .study-btn { border-color: #ffd60a; color: #ffd60a; }
        .submit-btn { background: var(--cyan); color: var(--bg); border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        canvas { background: transparent; margin: 0 auto 20px; display: block; max-width: 100%; }
        input { background: #0b1220; border: 2px solid var(--red); color: white; padding: 15px; font-size: 1.1rem; border-radius: 10px; text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        
        .word-bank { background: #0d1425; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #1a2235; }
        .word-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .word-item { padding: 6px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .bg-red { background: #e63946; } .bg-blue { background: #0077b6; } .bg-cream { background: #f1e4c0; color: #333; } .bg-black { background: #000; } .bg-yellow { background: #ffd60a; color: #333; } .bg-gray { background: #334155; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #1a2235; border: 1px solid #374151; color: white; border-radius: 8px; text-align: left; cursor: pointer; }
        .option-btn.correct { background: #4ee44e !important; color: #0b1220; font-weight: bold; }
        .option-btn.wrong { background: var(--red) !important; }
    </style>
</head>
<body>

<header>
    <button class="nav-btn active" onclick="switchView('fire', this)">🔥 Fire Safety</button>
    <button class="nav-btn" onclick="switchView('compass', this)">⚓ Compass</button>
    <button class="nav-btn" onclick="switchView('exam', this)">📜 OIC REVIEWER</button>
</header>

<div class="container">
    <section id="fire-view" class="view active">
        <h1>Fire Safety Mastery</h1>
        <div class="word-bank">
            <div class="word-list">
                <span class="word-item bg-red" onclick="fillFire('Water Fire Extinguisher')">Water</span>
                <span class="word-item bg-cream" onclick="fillFire('Foam Fire Extinguisher')">Foam</span>
                <span class="word-item bg-blue" onclick="fillFire('Dry Powder Fire Extinguisher')">Dry Powder</span>
                <span class="word-item bg-black" onclick="fillFire('CO2 Fire Extinguisher')">CO2</span>
                <span class="word-item bg-yellow" onclick="fillFire('Wet Chemical Fire Extinguisher')">Wet Chem</span>
                <span class="word-item bg-gray" onclick="fillFire('Class A')">Class A</span>
                <span class="word-item bg-gray" onclick="fillFire('Class B')">Class B</span>
                <span class="word-item bg-gray" onclick="fillFire('Class C')">Class C</span>
                <span class="word-item bg-gray" onclick="fillFire('Class D')">Class D</span>
                <span class="word-item bg-gray" onclick="fillFire('Class K')">Class K</span>
            </div>
        </div>
        <div class="card">
            <div id="f-progress" style="color: var(--cyan); margin-bottom: 10px;">Question 1 / 10</div>
            <div id="f-display" style="font-size: 70px; text-align: center; margin-bottom: 10px;">?</div>
            <p id="f-prompt" style="font-size: 1.1rem; min-height: 50px;"></p>
            <input type="text" id="fireInput" placeholder="Type or click from bank...">
            <button class="submit-btn" onclick="checkFire()">Submit Answer</button>
            <div id="f-msg" style="margin-top:20px; font-weight:bold; text-align:center;"></div>
        </div>
    </section>

    <section id="compass-view" class="view">
        <h1>Boxing the Compass</h1>
        <div class="stats-dashboard">
            <div class="stat-box"><span id="c-known">0 / 32</span><div class="stat-label">Progress</div></div>
            <div class="stat-box"><span id="c-timer">10s</span><div class="stat-label" id="timer-label">Time Remaining</div></div>
        </div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div class="difficulty-selector">
            <button class="study-btn" onclick="toggleStudyMode()">📖 REVIEW POINTS (60s)</button>
            <button class="diff-btn active" onclick="setDiff('easy', this)">EASY</button>
            <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
            <button class="diff-btn" onclick="setDiff('expert', this)">EXPERT</button>
        </div>
        <canvas id="compassCanvas" width="450" height="450"></canvas>
        <div class="card" id="compassCard">
            <input type="text" id="compassInput" placeholder="e.g. NbE">
            <button class="submit-btn" onclick="checkCompass()">Confirm Heading</button>
            <div id="c-msg" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
        </div>
    </section>

<section id="exam-view" class="view">
    <div class="stats-dashboard">
        <div class="stat-box"><span id="e-count">1 / 100</span><div class="stat-label">Question</div></div>
        <div class="stat-box"><span id="e-category" style="color: #ffd60a; font-size: 0.8rem;">GENERAL</span><div class="stat-label">Category</div></div>
        <div class="stat-box"><span id="e-score">0</span><div class="stat-label">Score</div></div>
    </div>
    <div class="card">
        <p id="e-question" style="font-size: 1.1rem; font-weight: bold; color: var(--cyan); margin-bottom: 20px;"></p>
        <div id="e-options"></div>
        <div id="e-msg" style="margin-top:20px; font-weight:bold; text-align:center;"></div>
    </div>
</section>
</div>

<script>
    // --- GLOBAL NAV ---
    function switchView(view, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(view + '-view').classList.add('active');
        btn.classList.add('active');
        if(typeof isStudyMode !== 'undefined' && isStudyMode) stopStudyMode();
        if(view === 'compass') { startTimer(); drawCompass(); }
        if(view === 'fire') loadFire();
        if(view === 'exam') loadExam();
    }

    // --- FIRE SAFETY (RESTORED & SHUFFLE ADDED) ---
    let fIdx = 0;
    const fireQuestionsRaw = [
        { q: "Which agent is best for wood, paper, and textiles?", a: ["water fire extinguisher"], d: "🪵" },
        { q: "Which agent is used for Class B and C involving electrical?", a: ["co2 fire extinguisher", "dry powder fire extinguisher"], d: "⚡" },
        { q: "Primary agent for kitchen cooking oils?", a: ["wet chemical fire extinguisher"], d: "🍳" },
        { q: "Agent for both Class A and B fires?", a: ["foam fire extinguisher"], d: "⛽" },
        { q: "Known as 'Multi-Purpose' for A, B, and C?", a: ["dry powder fire extinguisher"], d: "🏗️" },
        { q: "Burning Magnesium or Titanium class?", a: ["class d"], d: "⚙️" },
        { q: "Computer servers and wiring class?", a: ["class c"], d: "💻" },
        { q: "Burning cardboard and plastic class?", a: ["class a"], d: "📦" },
        { q: "Flammable liquids like diesel class?", a: ["class b"], d: "🧴" },
        { q: "Which class specifically requires Wet Chemical?", a: ["class k"], d: "🥓" }
    ];
    let fireData = [...fireQuestionsRaw];

    function shuffleFire() {
        for (let i = fireData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fireData[i], fireData[j]] = [fireData[j], fireData[i]];
        }
    }

    function loadFire() {
        if (fIdx === 0) shuffleFire(); // Shuffle every time we start a new round
        const cur = fireData[fIdx];
        document.getElementById('f-display').innerText = cur.d;
        document.getElementById('f-prompt').innerText = cur.q;
        document.getElementById('f-progress').innerText = `Question ${fIdx + 1} / ${fireData.length}`;
        document.getElementById('fireInput').value = "";
    }

    function checkFire() {
        const input = document.getElementById('fireInput').value.trim().toLowerCase();
        if(fireData[fIdx].a.includes(input)) {
            msg('f-msg', "Correct!", "#4ee44e");
            fIdx++;
            if (fIdx >= fireData.length) {
                fIdx = 0; // Reset for next round
                setTimeout(() => { alert("Fire Safety Set Complete!"); loadFire(); }, 800);
            } else {
                setTimeout(loadFire, 800);
            }
        } else {
            msg('f-msg', "Wrong!", "#ff4d4d");
        }
    }

    function fillFire(v) { document.getElementById('fireInput').value = v; checkFire(); }

    // --- COMPASS LOGIC ---
    const pts = ["N", "NbE", "NNE", "NEbN", "NE", "NEbE", "ENE", "EbN", "E", "EbS", "ESE", "SEbE", "SE", "SEbS", "SSE", "SbE", "S", "SbW", "SSW", "SWbS", "SW", "SWbW", "WSW", "WbS", "W", "WbN", "WNW", "NWbW", "NW", "NWbN", "NNW", "NbW"];
    let cIdx = 0, disc = new Set(), diff = 'easy', timeLeft = 10, timerInterval = null, isStudyMode = false;
    const canvas = document.getElementById("compassCanvas"), ctx = canvas.getContext("2d");

    function setDiff(mode, btn) {
        if(isStudyMode) stopStudyMode();
        diff = mode;
        disc.clear();
        document.getElementById('c-known').innerText = "0 / 32";
        cIdx = (mode === 'expert') ? Math.floor(Math.random() * 32) : 0;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startTimer();
        drawCompass();
    }

    function nextPoint() {
        if(diff === 'easy') cIdx = (cIdx + 1) % 32;
        else if(diff === 'hard') cIdx = (cIdx - 1 + 32) % 32;
        else cIdx = Math.floor(Math.random() * 32);
        drawCompass();
    }

    function drawCompass() {
        const cx=225, cy=225, r=180;
        ctx.clearRect(0,0,450,450);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle="#00e5ff"; ctx.lineWidth=3; ctx.stroke();
        for(let i=0; i<32; i++) {
            const rad = (i*11.25-90)*Math.PI/180;
            const isMaj = i%8===0;
            ctx.beginPath(); ctx.moveTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r);
            ctx.lineTo(cx+Math.cos(rad)*(r-(isMaj?15:8)), cy+Math.sin(rad)*(r-(isMaj?15:8)));
            ctx.strokeStyle = isMaj ? "#00e5ff" : "#444"; ctx.stroke();
            if(isStudyMode || disc.has(i)) {
                ctx.save(); ctx.translate(cx+Math.cos(rad)*(r-30), cy+Math.sin(rad)*(r-30));
                ctx.fillStyle = ["N","E","S","W"].includes(pts[i]) ? "#ff4d4d" : "white";
                ctx.font = isMaj ? "bold 13px Arial" : "9px Arial"; ctx.textAlign="center"; ctx.fillText(pts[i], 0, 5); ctx.restore();
            }
        }
        if(!isStudyMode) {
            const tRad = (cIdx*11.25-90)*Math.PI/180;
            ctx.save(); ctx.translate(cx,cy); ctx.rotate(tRad+Math.PI/2);
            ctx.beginPath(); ctx.moveTo(0,-140); ctx.lineTo(12,0); ctx.lineTo(-12,0); ctx.fillStyle="#ff4d4d"; ctx.fill();
            ctx.beginPath(); ctx.moveTo(0,140); ctx.lineTo(12,0); ctx.lineTo(-12,0); ctx.fillStyle="white"; ctx.fill();
            ctx.restore();
        }
    }

    function toggleStudyMode() {
        isStudyMode = true; timeLeft = 60;
        document.getElementById('timer-label').innerText = "STUDY TIME";
        document.getElementById('compassCard').style.opacity = "0.3";
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1; updateTimerUI(); drawCompass();
            if(timeLeft <= 0) stopStudyMode();
        }, 100);
    }
    function stopStudyMode() {
        isStudyMode = false; document.getElementById('timer-label').innerText = "Time Remaining";
        document.getElementById('compassCard').style.opacity = "1"; startTimer();
    }
    function startTimer() {
        clearInterval(timerInterval); timeLeft=10;
        timerInterval=setInterval(()=>{ timeLeft-=0.1; updateTimerUI(); if(timeLeft<=0){ nextPoint(); startTimer(); } }, 100);
    }
    function updateTimerUI() {
        document.getElementById('timer-bar').style.width=(timeLeft/(isStudyMode?60:10))*100+"%";
        document.getElementById('c-timer').innerText=Math.ceil(timeLeft)+"s";
    }
    function checkCompass() {
        const inputEl = document.getElementById('compassInput');
        if(inputEl.value.trim().toUpperCase() === pts[cIdx].toUpperCase()) {
            disc.add(cIdx); msg('c-msg', "Correct!", "#4ee44e"); nextPoint(); startTimer(); 
            inputEl.value=""; document.getElementById('c-known').innerText=`${disc.size} / 32`;
        } else {
            msg('c-msg', "Wrong! Try again.", "#ff4d4d");
            inputEl.value = "";
        }
    }

   // --- BOARD PREP ---

// 1. Define the tracking variables
let currentExamIdx = 0; 
let examScore = 0;
let shuffledQuestions = [];      

// 2. The Question Database
const examQuestions = [
    // --- NAVIGATION & GENERAL ---
    { 
        q: "What is the reference line for measuring Longitude?", 
        a: "The Prime Meridian (Greenwich)", 
        o: ["The Equator", "The Prime Meridian (Greenwich)", "International Date Line", "Tropic of Cancer"],
        cat: "NAVIGATION"
    },
    { 
        q: "A 'Small Circle' on the Earth's surface is any circle whose plane:", 
        a: "Does not pass through the center of the Earth", 
        o: ["Passes through the geographical poles", "Passes through the center of the Earth", "Does not pass through the center of the Earth", "Is parallel to the Prime Meridian"],
        cat: "NAVIGATION"
    },
    { 
        q: "In ECDIS, what color is used to represent 'Isolated Danger' symbols?", 
        a: "Magenta", 
        o: ["Black", "Magenta", "Red", "Blue"],
        cat: "NAVIGATION"
    },
    { 
        q: "To convert a Compass Course to a True Course, you must apply:", 
        a: "Variation and Deviation", 
        o: ["Variation and Deviation", "Deviation only", "Drift and Leeway", "Magnetic Dip"],
        cat: "NAVIGATION"
    },
    { 
        q: "Which publication contains information on light characteristics and fog signals?", 
        a: "List of Lights", 
        o: ["Notice to Mariners", "Sailing Directions", "List of Lights", "Tide Tables"],
        cat: "NAVIGATION"
    },
    { 
        q: "What is the frequency of GPS L1 signals?", 
        a: "1575.42 MHz", 
        o: ["1227.60 MHz", "1575.42 MHz", "1090.00 MHz", "2182.00 KHz"],
        cat: "NAVIGATION"
    },
    { 
        q: "What is the meaning of a 'Simple' fix in navigation?", 
        a: "The intersection of two or more position lines (LOPs) taken at the same time", 
        o: ["A position based on Dead Reckoning", "A single bearing from a lighthouse", "The intersection of two or more position lines (LOPs) taken at the same time", "A position obtained by celestial observation only"],
        cat: "NAVIGATION"
    },
    { 
        q: "The distance between the sun and the earth is greatest at:", 
        a: "Aphelion", 
        o: ["Perihelion", "Aphelion", "Vernal Equinox", "Winter Solstice"],
        cat: "NAVIGATION"
    },
    { 
        q: "Which radar control is used to suppress clutter from rain or snow?", 
        a: "FTC (Fast Time Constant)",

    },
    {

        o: ["Estimated Position", "Running Fix", "Dead Reckoning Position", "Celestial Fix"],
        cat: "NAVIGATION"
    },

    // --- COLREGs ---
    { 
        q: "Under Rule 5, every vessel must maintain a proper look-out by:", 
        a: "Sight and hearing as well as by all available means appropriate", 
        o: ["Sight and hearing as well as by all available means appropriate", "Radar and Binoculars only", "VHF radio monitoring", "Posting a person on the forecastle only"],
        cat: "COLREGs"
    },
    { 
        q: "What is the day shape for a vessel 'Not Under Command'?", 
        a: "Two black balls in a vertical line", 
        o: ["A black diamond", "Two black balls in a vertical line", "Three black balls in a vertical line", "A cylinder"],
        cat: "COLREGs"
    },
    { 
        q: "In a crossing situation, which vessel is the 'Give-way' vessel?", 
        a: "The vessel which has the other on her own starboard side", 
        o: ["The vessel which has the other on her own port side", "The larger vessel", "The vessel which has the other on her own starboard side", "The faster vessel"],
        cat: "COLREGs"
    },
    { 
        q: "Rule 6 (Safe Speed) applies to vessels in:", 
        a: "All conditions of visibility", 
        o: ["Restricted visibility only", "Clear visibility only", "All conditions of visibility", "Narrow channels only"],
        cat: "COLREGs"

    { 
        q: "A power-driven vessel 'underway but stopped and making no way' through the water shall exhibit:", 
        a: "The same lights as a vessel making way", 
        o: ["Two all-round red lights", "A single white light", "The same lights as a vessel making way", "No lights at all"],
        cat: "COLREGs"
    },
    { 
        q: "What is the fog signal for a vessel constrained by her draft?", 
        a: "One prolonged blast followed by two short blasts every 2 minutes",

    { 
        q: "A 'Short Blast' has a duration of approximately:", 
        a: "One second", 
        o: ["One second", "Two seconds", "Four to six seconds", "Half a second"],

    { 
        q: "Which rule defines the 'Responsibility between Vessels' (Hierarchy)?", 
        a: "Rule 18", 
        o: ["Rule 10", "Rule 18", "Rule 14", "Rule 19"],
        cat: "COLREGs"
    },
    { 
        q: "In a narrow channel, a vessel of less than 20 meters shall not:", 
        a: "Impede the passage of a vessel which can safely navigate only within such channel", 
        o: ["Anchor at all", "Use whistle signals", "Impede the passage of a vessel which can safely navigate only within such channel", "Exceed 5 knots"],
        cat: "COLREGs"

    { 
        q: "What lights must a vessel 'Restricted in her ability to maneuver' show at night?", 
        a: "Red-White-Red in a vertical line", 
        o: ["Red over Red", "Green over White", "Red-White-Red in a vertical line", "Three White lights in a line"],
        cat: "COLREGs"
    },

    // --- CARGO HANDLING ---
    { 
        q: "What is the definition of 'Stowage Factor'?", 
        a: "The volume occupied by one unit of weight of cargo", 
        o: ["The weight of cargo per square meter", "The volume occupied by one unit of weight of cargo", "The percentage of empty space in a hold", "The total capacity of a cargo hold"],
        cat: "CARGO"
    },
    { 
        q: "The vertical distance between the Keel and the Center of Buoyancy is:", 
        a: "KB", 
        o: ["KG", "KM", "KB", "GM"],
        cat: "CARGO"
    },
    { 
        q: "A 'Stiff Ship' is characterized by:", 
        a: "A very large GM and a short, jerky rolling period", 
        o: ["A small GM and a slow, easy roll", "A neutral GM", "A very large GM and a short, jerky rolling period", "A negative GM"],
        cat: "CARGO"
    },
    { 
        q: "Which cargo document provides information on the hazardous properties of chemicals?", 
        a: "MSDS (Material Safety Data Sheet)", 
        o: ["Cargo Manifest", "Bill of Lading", "MSDS (Material Safety Data Sheet)", "Mate's Receipt"],
        cat: "CARGO"
    },
    { 
        q: "'Broken Stowage' refers to:", 
        a: "The empty spaces between packages or space lost due to dunnage", 
        o: ["Damaged cargo packages", "The empty spaces between packages or space lost due to dunnage", "The weight of the dunnage used", "Cargo that has shifted during transit"],
        cat: "CARGO"
    },
    { 
        q: "The angle of list is caused by:", 
        a: "An off-center distribution of weight", 
        o: ["External forces like wind", "The ship's forward motion", "An off-center distribution of weight", "The density of sea water"],
        cat: "CARGO"
    },
    { 
        q: "What is the purpose of 'Dunnage'?", 
        a: "To protect cargo from moisture and ensure ventilation", 
        o: ["To increase the ship's stability", "To protect cargo from moisture and ensure ventilation", "To secure the vessel at the pier", "To calculate the cargo weight"],
        cat: "CARGO"
    },
    { 
        q: "What does the 'Ullage' of a tank represent?", 
        a: "The distance from the top of the tank to the surface of the liquid", 
        o: ["The depth of the liquid in the tank", "The total weight of the liquid", "The distance from the top of the tank to the surface of the liquid", "The pressure inside the tank"],
        cat: "CARGO"
    },

    // --- SAFETY & MARPOL ---
    { 
        q: "Under MARPOL Annex I, what is the maximum oil content for discharge from machinery spaces?", 
        a: "15 parts per million (ppm)", 
        o: ["100 ppm", "50 ppm", "15 parts per million (ppm)", "0 ppm"],
        cat: "SAFETY"
    },
    { 
        q: "How many lifebuoys are required on a cargo ship between 100m and 150m in length?", 
        a: "At least 10", 
        o: ["At least 8", "At least 10", "At least 12", "At least 14"],
        cat: "SAFETY"
    },
    { 
        q: "What is the signal for a 'General Emergency' on the ship's whistle?", 
        a: "Seven short blasts followed by one prolonged blast", 
        o: ["Three long blasts", "Continuous ringing of the bell", "Seven short blasts followed by one prolonged blast", "One prolonged blast followed by seven short blasts"],
        cat: "SAFETY"
    },
    { 
        q: "Which MARPOL Annex regulates the prevention of pollution by Sewage?", 
        a: "Annex IV", 
        o: ["Annex I", "Annex II", "Annex IV", "Annex VI"],
        cat: "SAFETY"
    },
    {

function shuffleExam() {
    shuffledQuestions = [...examQuestions]; 
    for (let i = shuffledQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
    }
}

// 3. The Function to Load Questions
function loadExam() {
    if (currentExamIdx === 0) shuffleExam();

    const q = shuffledQuestions[currentExamIdx];
    
    // UPDATE THE CATEGORY DISPLAY
    document.getElementById('e-category').innerText = q.cat || "GENERAL";
    
    document.getElementById('e-count').innerText = `${currentExamIdx + 1} / ${shuffledQuestions.length}`;
    document.getElementById('e-question').innerText = q.q;
    document.getElementById('e-score').innerText = examScore;
    
    const optionsBox = document.getElementById('e-options');
    optionsBox.innerHTML = ""; 

    // --- ADDED THIS PART: Create and Shuffle the options list ---
    let shuffledOptions = [...q.o]; 
    for (let i = shuffledOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
    }
    
    // Now use the shuffledOptions list to create buttons
    shuffledOptions.forEach(o => {
        const btn = document.createElement('button');
        btn.className = "option-btn";
        btn.innerText = o;
        
        btn.onclick = () => {
            const allBtns = optionsBox.querySelectorAll('button');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if(o === q.a) {
                btn.classList.add('correct');
                examScore++;
                document.getElementById('e-score').innerText = examScore;
                msg('e-msg', "Correct!", "#4ee44e");
            } else {
                btn.classList.add('wrong');
                msg('e-msg', `Wrong! The correct answer was: ${q.a}`, "#ff4d4d");
            }
            
            setTimeout(() => {
                currentExamIdx++;
                if (currentExamIdx >= shuffledQuestions.length) {
                    alert(`Set Finished! Final Score: ${examScore} / ${shuffledQuestions.length}`);
                    currentExamIdx = 0;
                    examScore = 0; 
                }
                loadExam();
            }, 1500); 
        };
        optionsBox.appendChild(btn);
    });
}
// Global Message helper
function msg(id, t, c) { 
    const el = document.getElementById(id); 
    el.innerText = t; 
    el.style.color = c; 
    setTimeout(() => el.innerText = "", 1000); 
}
